<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
    <title>Yeah Buddy!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }

        header {
            padding: 20px 24px 15px;
            text-align: center;
        }

        header h1 {
            color: #e94560;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        header p {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .header-left {
            display: inline;
        }

        .header-center {
            display: flex;
            gap: 4px;
            justify-content: center;
        }

        .header-right {
            display: none;
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Form Styles */
        .workout-form {
            background: #16213e;
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .workout-form h2 {
            margin-bottom: 10px;
            color: #e94560;
            font-size: 1rem;
        }

        .form-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .form-group {
            flex: 1;
            min-width: 70px;
        }

        .form-group.wide {
            min-width: 180px;
            flex: 2;
        }

        .form-group label {
            display: block;
            margin-bottom: 2px;
            font-size: 0.65rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 6px 8px;
            border: 2px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #eee;
            font-size: 0.85rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e94560;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: #e94560;
            color: #fff;
        }

        .btn-primary:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #0f3460;
            color: #fff;
        }

        .btn-secondary:hover {
            background: #1a4a8a;
        }

        .btn-danger {
            background: #c0392b;
            color: #fff;
            width: 28px;
            height: 28px;
            padding: 0;
            font-size: 0.85rem;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .btn-danger:hover {
            background: #e74c3c;
        }

        .btn-small {
            padding: 5px 10px;
            font-size: 0.8rem;
        }

        /* Week sections */
        .week-section {
            background: #16213e;
            border-radius: 12px;
            margin-bottom: 15px;
            overflow: hidden;
            border: 1px solid #0f3460;
        }

        .week-section.past-week {
            opacity: 0.6;
            background: #1a1a2a;
            border-color: #333;
        }

        .week-section.past-week .week-header {
            background: #2a2a3a;
        }

        .week-section.past-week .week-header:hover {
            background: #333;
        }

        .week-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: #0f3460;
            cursor: pointer;
            user-select: none;
            transition: background 0.3s;
        }

        .week-header:hover {
            background: #1a4a8a;
        }

        .week-header h3 {
            color: #e94560;
            font-size: 1.1rem;
        }

        .week-header .week-summary {
            color: #aaa;
            font-size: 0.85rem;
        }

        .week-header .toggle-icon {
            font-size: 1.2rem;
            transition: transform 0.3s;
            color: #aaa;
        }

        .week-header .toggle-icon.collapsed {
            transform: rotate(-90deg);
        }

        .week-body {
            padding: 8px;
            overflow-x: auto;
        }

        .week-body.collapsed {
            display: none;
        }

        /* Workout Table */
        .workout-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .workout-table th {
            text-align: center;
            padding: 8px 10px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #0f3460;
            white-space: nowrap;
        }

        /* Column header colors match day */
        .day-bg-monday .workout-table th { color: #2ecc71; }
        .day-bg-tuesday .workout-table th { color: #3498db; }
        .day-bg-wednesday .workout-table th { color: #f1c40f; }
        .day-bg-thursday .workout-table th { color: #8e44ad; }
        .day-bg-friday .workout-table th { color: #e67e22; }
        .day-bg-saturday .workout-table th { color: #7f8c8d; }
        .day-bg-sunday .workout-table th { color: #e74c3c; }

        .workout-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #0f3460;
            vertical-align: middle;
            text-align: center;
        }

        .workout-table tr:last-child td {
            border-bottom: none;
        }

        .workout-table tbody tr:nth-child(even) {
            background: rgba(15, 52, 96, 0.3);
        }

        .workout-table tbody tr:nth-child(odd) {
            background: rgba(26, 26, 46, 0.5);
        }

        .workout-table .note-cell {
            font-style: italic;
            color: #aaa;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Day block */
        .day-block {
            margin-bottom: 15px;
            border-radius: 6px;
            overflow: hidden;
            padding: 0;
        }

        .day-block:last-child {
            margin-bottom: 0;
        }

        .day-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            border-radius: 6px 6px 0 0;
        }

        .day-header-bar .day-title {
            font-weight: bold;
            font-size: 1rem;
        }

        .day-bg-monday .day-title { color: #2ecc71; }
        .day-bg-tuesday .day-title { color: #3498db; }
        .day-bg-wednesday .day-title { color: #f1c40f; }
        .day-bg-thursday .day-title { color: #8e44ad; }
        .day-bg-friday .day-title { color: #e67e22; }
        .day-bg-saturday .day-title { color: #7f8c8d; }
        .day-bg-sunday .day-title { color: #e74c3c; }

        .day-header-bar .day-date {
            color: #eee;
            margin-left: 10px;
            font-size: 0.9rem;
        }

        .day-header-bar .day-intensity-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .day-header-bar .intensity-alright {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .day-header-bar .intensity-wooo {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
        }

        .day-header-bar .intensity-lightweight-baby {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
        }

        /* Day note display bar */
        .day-note-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .day-note-bar .note-label {
            color: #e94560;
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .day-note-bar .note-text {
            color: #aaa;
            font-style: italic;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .day-note-bar .note-text.empty {
            color: #555;
        }

        .btn-note-edit {
            background: #2980b9;
            color: #fff;
            padding: 4px 10px;
            font-size: 0.75rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-note-edit:hover {
            background: #3498db;
        }

        /* Reorder button */
        .btn-reorder {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .btn-reorder:hover {
            background: rgba(255,255,255,0.1);
        }

        /* Reorder list */
        .reorder-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: grab;
            user-select: none;
            transition: background 0.2s, transform 0.2s;
        }

        .reorder-item:active {
            cursor: grabbing;
            background: #0f3460;
            transform: scale(1.02);
        }

        .reorder-item.dragging {
            opacity: 0.5;
            background: #0f3460;
        }

        .reorder-item .drag-handle {
            color: #555;
            font-size: 1.2rem;
        }

        .reorder-item .reorder-name {
            flex: 1;
            font-size: 0.9rem;
        }

        .reorder-item .reorder-detail {
            color: #aaa;
            font-size: 0.8rem;
        }

        /* Field settings items */
        .field-setting-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: grab;
            user-select: none;
        }

        .field-setting-item:active {
            cursor: grabbing;
        }

        .field-setting-item.dragging {
            opacity: 0.5;
            background: #0f3460;
        }

        .field-setting-item .field-drag {
            color: #555;
            font-size: 1.1rem;
        }

        .field-setting-item .field-name {
            flex: 1;
            font-size: 0.9rem;
        }

        .field-setting-item .field-toggle {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #e94560;
        }

        .field-setting-item .field-remove {
            background: none;
            border: none;
            color: #c0392b;
            cursor: pointer;
            font-size: 1rem;
            padding: 2px 6px;
        }

        .field-setting-item .field-remove:hover {
            color: #e74c3c;
        }

        /* Day color backgrounds by weekday */
        .day-bg-monday { background: rgba(46, 204, 113, 0.15); border: 1px solid rgba(46, 204, 113, 0.4); }
        .day-bg-tuesday { background: rgba(52, 152, 219, 0.15); border: 1px solid rgba(52, 152, 219, 0.4); }
        .day-bg-wednesday { background: rgba(241, 196, 15, 0.15); border: 1px solid rgba(241, 196, 15, 0.4); }
        .day-bg-thursday { background: rgba(142, 68, 173, 0.15); border: 1px solid rgba(142, 68, 173, 0.5); }
        .day-bg-friday { background: rgba(230, 126, 34, 0.15); border: 1px solid rgba(230, 126, 34, 0.4); }
        .day-bg-saturday { background: rgba(127, 140, 141, 0.12); border: 1px solid rgba(127, 140, 141, 0.5); }
        .day-bg-sunday { background: rgba(231, 76, 60, 0.15); border: 1px solid rgba(231, 76, 60, 0.5); }

        /* Day separator */
        .day-block + .day-block {
            border-top: 2px solid #e94560;
        }

        .day-block.day-today {
            border: 2px solid rgba(233, 69, 96, 0.8);
            box-shadow: none;
            position: relative;
            z-index: 1;
        }

        .day-block.day-today + .day-block {
            border-top: 2px solid #555;
        }

        .day-block.day-today ~ .day-block + .day-block {
            border-top: 2px solid #555;
        }

        .workout-table .actions-cell {
            white-space: nowrap;
        }

        .btn-edit {
            background: #2980b9;
            color: #fff;
            width: 28px;
            height: 28px;
            padding: 0;
            font-size: 0.85rem;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 2px;
            line-height: 1;
        }

        .btn-edit:hover {
            background: #3498db;
        }

        .btn-duplicate {
            background: #27ae60;
            color: #fff;
            width: 28px;
            height: 28px;
            padding: 0;
            font-size: 0.85rem;
            border: none;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-right: 2px;
            line-height: 1;
        }

        .btn-duplicate:hover {
            background: #2ecc71;
        }

        /* Edit modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #16213e;
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 650px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 {
            color: #e94560;
            margin-bottom: 15px;
        }

        .modal .form-group {
            margin-bottom: 12px;
            min-width: auto;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* RPE coloring */
        .rpe-low { color: #2ecc71; }
        .rpe-mid { color: #f39c12; }
        .rpe-high { color: #e74c3c; }

        /* Generate week preview */
        .gen-day-section {
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            margin-bottom: 12px;
            padding: 12px;
        }

        .gen-day-header {
            font-weight: bold;
            color: #e94560;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .gen-exercise-row {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
            flex-wrap: wrap;
            align-items: center;
        }

        .gen-exercise-row input,
        .gen-exercise-row select {
            padding: 6px 8px;
            border: 1px solid #0f3460;
            border-radius: 6px;
            background: #16213e;
            color: #eee;
            font-size: 0.8rem;
        }

        .gen-exercise-row input[type="text"] {
            flex: 2;
            min-width: 120px;
        }

        .gen-exercise-row input[type="number"] {
            width: 60px;
        }

        .gen-exercise-row .gen-remove-btn {
            background: #c0392b;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .gen-add-exercise-btn {
            background: none;
            border: 1px dashed #0f3460;
            color: #aaa;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 6px;
        }

        .gen-add-exercise-btn:hover {
            border-color: #e94560;
            color: #e94560;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }

        .empty-state p {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.1rem;
            }

            header {
                flex-direction: column;
                gap: 10px;
            }

            .form-row {
                flex-direction: column;
            }

            .form-group {
                min-width: 100% !important;
            }

            .workout-table {
                font-size: 0.75rem;
            }

            .workout-table th,
            .workout-table td {
                padding: 6px 6px;
            }

            .nav-tabs {
                flex-direction: column;
            }

            .dashboard-layout {
                flex-direction: column;
            }

            .dashboard-sidebar {
                flex-direction: row;
                overflow-x: auto;
                border-right: none;
                border-bottom: 1px solid #0f3460;
            }
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            gap: 4px;
        }

        .nav-tab {
            padding: 8px 20px;
            border-radius: 6px;
            border: 1px solid #0f3460;
            background: #16213e;
            color: #888;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-tab:hover { border-color: #e94560; color: #eee; }
        .nav-tab.active {
            background: #e94560;
            color: #fff;
            border-color: #e94560;
        }

        /* Page containers */
        .page { display: none; }
        .page.active { display: block; }

        /* Performance / Dashboard */
        .dashboard-layout {
            display: flex;
            gap: 15px;
            min-height: calc(100vh - 250px);
        }

        .dashboard-sidebar {
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 15px;
            background: #16213e;
            border-radius: 12px;
            border-right: 1px solid #0f3460;
        }

        .dash-nav-btn {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: #aaa;
            font-size: 0.8rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .dash-nav-btn:hover { background: #0f3460; color: #eee; }
        .dash-nav-btn.active { background: #e94560; color: #fff; font-weight: bold; }

        .dashboard-main {
            flex: 1;
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            min-height: 400px;
        }

        .chart-container {
            width: 100%;
            height: 100%;
            min-height: 350px;
            position: relative;
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #e94560;
            margin-bottom: 15px;
        }

        .chart-canvas {
            width: 100%;
            height: 300px;
            background: #1a1a2e;
            border-radius: 8px;
            border: 1px solid #0f3460;
            position: relative;
            overflow: hidden;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: #1a1a2e;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .stat-box .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #e94560;
        }

        .stat-box .stat-label {
            font-size: 0.75rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* Bar chart via CSS */
        .bar-chart {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 250px;
            padding: 20px 15px 40px;
        }

        .bar-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-end;
        }

        .bar {
            width: 100%;
            max-width: 50px;
            border-radius: 4px 4px 0 0;
            transition: height 0.5s;
            min-height: 2px;
        }

        .bar-label {
            font-size: 0.65rem;
            color: #aaa;
            margin-top: 8px;
            text-align: center;
            white-space: nowrap;
        }

        .bar-value {
            font-size: 0.7rem;
            color: #eee;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <header>
        <h1>💪 Yeah Buddy!</h1>
        <p>Lightweight Baby! WooOoOoo~</p>
        <div class="header-center">
            <button class="nav-tab active" id="nav-activities" onclick="switchPage('activities')">🏋️ Activities</button>
            <button class="nav-tab" id="nav-performance" onclick="switchPage('performance')">📊 Performance</button>
        </div>
    </header>

    <div class="page active" id="page-activities">
    <div class="container">
        <!-- Add Exercise Form -->
        <div class="workout-form">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <h2 style="margin-bottom:0;font-size:0.95rem;">Add Exercise</h2>
                <div style="display:flex; gap:8px; align-items:center;">
                    <button class="btn btn-secondary btn-small" onclick="openFieldSettings()">⚙️ Fields</button>
                    <button class="btn btn-secondary btn-small" onclick="openGenerateWeek()">🔄 Generate Week</button>
                    <button class="btn btn-secondary btn-small" id="collapse-form-btn" onclick="toggleFormCollapse()">▲</button>
                </div>
            </div>
            <div id="form-body">
            <div class="form-row">
                <div class="form-group">
                    <label for="entry-date">Date</label>
                    <input type="date" id="entry-date">
                </div>
                <div class="form-group">
                    <label for="entry-intensity">Day Intensity</label>
                    <select id="entry-intensity">
                        <option value="Alright">Alright</option>
                        <option value="Wooo" selected>Wooo</option>

    <script>
        // Environment prefix for localStorage isolation
        const ENV_PREFIX = 'prod_';

        // State
        let entries = JSON.parse(localStorage.getItem(ENV_PREFIX + 'yeahBuddyEntries')) || [];
        let dayNotes = JSON.parse(localStorage.getItem(ENV_PREFIX + 'yeahBuddyDayNotes')) || {};

        // Default field definitions
        const defaultFields = [
            { key: 'exercise', label: 'Exercise', type: 'text', placeholder: 'e.g. Bench Press', default: '', wide: true },
            { key: 'sets', label: 'Sets', type: 'number', min: 1, step: 1, default: 3 },
            { key: 'reps', label: 'Reps', type: 'number', min: 1, step: 1, default: 10 },
            { key: 'load', label: 'Load', type: 'number', min: 0, step: 0.5, default: 0 },
            { key: 'rpe', label: 'RPE', type: 'number', min: 1, max: 10, step: 0.5, default: 7 },
            { key: 'inter', label: 'Rest', type: 'number', min: 0, step: 0.5, default: 2 },
            { key: 'note', label: 'Note', type: 'text', placeholder: 'Optional note...', default: '', wide: true }
        ];

        // Cardio field definitions
        const cardioFields = [
            { key: 'exercise', label: 'Activity', type: 'text', placeholder: 'e.g. Running, Cycling', default: '', wide: true },
            { key: 'duration', label: 'Duration (min)', type: 'number', min: 0, step: 1, default: 30 },
            { key: 'distance', label: 'Distance (km)', type: 'number', min: 0, step: 0.1, default: 0 },
            { key: 'pace', label: 'Pace (min/km)', type: 'number', min: 0, step: 0.1, default: 0 },
            { key: 'note', label: 'Note', type: 'text', placeholder: 'Optional note...', default: '', wide: true }
        ];

        // Fields that go on the first row (with exercise)
        const firstRowKeys = ['exercise', 'sets', 'reps', 'load', 'rpe', 'inter', 'duration', 'distance', 'pace'];

        // Load field settings from localStorage (strength)
        let fieldSettings = JSON.parse(localStorage.getItem(ENV_PREFIX + 'yeahBuddyFields')) || null;
        if (!fieldSettings) {
            fieldSettings = defaultFields.map(f => ({ ...f, enabled: true }));
        }
        // Migrate old labels
        fieldSettings.forEach(f => {
            if (f.key === 'load' && f.label === 'Load (Kg)') f.label = 'Load';
            if (f.key === 'inter' && f.label === 'Rest (min)') f.label = 'Rest';
        });

        // Load field settings from localStorage (cardio)
        let cardioFieldSettings = JSON.parse(localStorage.getItem(ENV_PREFIX + 'yeahBuddyCardioFields')) || null;
        if (!cardioFieldSettings) {
            cardioFieldSettings = cardioFields.map(f => ({ ...f, enabled: true }));
        }

        function saveFieldSettingsData() {
            localStorage.setItem(ENV_PREFIX + 'yeahBuddyFields', JSON.stringify(fieldSettings));
            localStorage.setItem(ENV_PREFIX + 'yeahBuddyCardioFields', JSON.stringify(cardioFieldSettings));
        }

        // Elements
        const entryDate = document.getElementById('entry-date');
        const entryIntensity = document.getElementById('entry-intensity');
        const addEntryBtn = document.getElementById('add-entry-btn');
        const weeksContainer = document.getElementById('weeks-container');

        // Track collapsed state
        let collapsedWeeks = JSON.parse(localStorage.getItem(ENV_PREFIX + 'yeahBuddyCollapsed')) || {};

        // Set default date to today (Brazil time)
        function getTodayBrazil() {
            return new Date().toLocaleDateString('en-CA', { timeZone: 'America/Sao_Paulo' });
        }
        entryDate.value = getTodayBrazil();

        // Collapse form
        let formCollapsed = false;
        function toggleFormCollapse() {
            formCollapsed = !formCollapsed;
            const body = document.getElementById('form-body');
            const btn = document.getElementById('collapse-form-btn');
            if (formCollapsed) {
                body.style.display = 'none';
                btn.textContent = '▼';
            } else {
                body.style.display = '';
                btn.textContent = '▲';
            }
        }

        // Current entry type
        let currentEntryType = 'strength';

        function onTypeChange() {
            currentEntryType = document.getElementById('entry-type').value;
            renderDynamicFields();
        }

        // Get active fields based on type
        function getActiveFields() {
            if (currentEntryType === 'cardio') {
                return cardioFieldSettings.filter(f => f.enabled && !f.key.includes('Muscle'));
            }
            return fieldSettings.filter(f => f.enabled && !f.key.includes('Muscle'));
        }

        // Render dynamic form fields
        function renderDynamicFields() {
            const container = document.getElementById('dynamic-fields');
            const activeFields = getActiveFields();

            // Split into two rows: first row = core fields, second row = rest
            const row1 = activeFields.filter(f => firstRowKeys.includes(f.key));
            const row2 = activeFields.filter(f => !firstRowKeys.includes(f.key));

            let html = '';

            if (row1.length > 0) {
                html += '<div class="form-row">';
                row1.forEach(field => {
                    html += buildFieldHtml(field);
                });
                html += '</div>';
            }

            if (row2.length > 0) {
                html += '<div class="form-row">';
                row2.forEach(field => {
                    html += buildFieldHtml(field);
                });
                html += '</div>';
            }

            container.innerHTML = html;

            // Re-attach Enter key on exercise field
            const exerciseField = document.getElementById('entry-exercise');
            if (exerciseField) {
                exerciseField.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') addEntry();
                });
            }
        }

        function buildFieldHtml(field) {
            const wideClass = field.wide ? ' wide' : '';
            const minAttr = field.min !== undefined ? ` min="${field.min}"` : '';
            const maxAttr = field.max !== undefined ? ` max="${field.max}"` : '';
            const stepAttr = field.step !== undefined ? ` step="${field.step}"` : '';
            const placeholderAttr = field.placeholder ? ` placeholder="${field.placeholder}"` : '';
            const valueAttr = field.default !== undefined && field.default !== '' ? ` value="${field.default}"` : '';

            let html = `<div class="form-group${wideClass}">`;
            html += `<label for="entry-${field.key}">${escapeHtml(field.label)}</label>`;

            // Add datalist dropdown for exercise field
            if (field.key === 'exercise') {
                const pastExercises = [...new Set(entries.map(e => e.exercise).filter(Boolean))].sort();
                html += `<input type="text" id="entry-${field.key}" list="exercise-suggestions"${placeholderAttr}${valueAttr}>`;
                html += `<datalist id="exercise-suggestions">`;
                pastExercises.forEach(ex => { html += `<option value="${escapeHtml(ex)}">`; });
                html += `</datalist>`;
            } else {
                html += `<input type="${field.type}" id="entry-${field.key}"${minAttr}${maxAttr}${stepAttr}${placeholderAttr}${valueAttr}>`;
            }

            html += `</div>`;
            return html;
        }

        // Add entry
        addEntryBtn.addEventListener('click', addEntry);

        function addEntry() {
            const exerciseField = document.getElementById('entry-exercise');
            if (exerciseField && !exerciseField.value.trim()) {
                exerciseField.focus();
                return;
            }

            const entry = {
                id: Date.now(),
                date: entryDate.value,
                intensity: entryIntensity.value,
                entryType: currentEntryType
            };

            // Gather values from all active fields based on type
            const activeFields = getActiveFields();
            activeFields.forEach(field => {
                const el = document.getElementById('entry-' + field.key);
                if (!el) return;
                if (field.type === 'number') {
                    entry[field.key] = parseFloat(el.value) || 0;
                } else {
                    entry[field.key] = el.value.trim();
                }
            });

            // Ensure exercise exists
            if (!entry.exercise) entry.exercise = '';

            entries.push(entry);
            saveEntries();
            renderWeeks();

            // Reset text fields, keep numbers
            activeFields.forEach(field => {
                const el = document.getElementById('entry-' + field.key);
                if (!el) return;
                if (field.type === 'text') {
                    el.value = '';
                }
            });

            const exerciseEl = document.getElementById('entry-exercise');
            if (exerciseEl) exerciseEl.focus();
        }

        // Field Settings Modal
        function openFieldSettings() {
            document.getElementById('fields-type-select').value = currentEntryType;
            renderFieldSettingsList();
            document.getElementById('fields-modal').classList.add('active');
        }

        function onFieldsTypeChange() {
            currentEntryType = document.getElementById('fields-type-select').value;
            document.getElementById('entry-type').value = currentEntryType;
            renderFieldSettingsList();
        }

        function closeFieldSettings() {
            document.getElementById('fields-modal').classList.remove('active');
        }

        function getCurrentFieldSettings() {
            return currentEntryType === 'cardio' ? cardioFieldSettings : fieldSettings;
        }

        function getDefaultFieldsForType() {
            return currentEntryType === 'cardio' ? cardioFields : defaultFields;
        }

        function saveFieldSettings() {
            // Read enabled states and order from checkboxes
            const items = document.querySelectorAll('#fields-settings-list .field-setting-item');
            const currentSettings = getCurrentFieldSettings();
            const newSettings = [];
            items.forEach(item => {
                const key = item.dataset.key;
                const field = currentSettings.find(f => f.key === key);
                if (field) {
                    const checkbox = item.querySelector('.field-toggle');
                    field.enabled = checkbox.checked;
                    newSettings.push(field);
                }
            });

            if (currentEntryType === 'cardio') {
                cardioFieldSettings = newSettings;
            } else {
                fieldSettings = newSettings;
            }

            saveFieldSettingsData();
            renderDynamicFields();
            closeFieldSettings();
        }

        function renderFieldSettingsList() {
            const list = document.getElementById('fields-settings-list');
            const currentSettings = getCurrentFieldSettings().filter(f => !f.key.includes('Muscle'));
            const defaults = getDefaultFieldsForType();
            const typeLabel = currentEntryType === 'cardio' ? '🏃 Cardio' : '🏋️ Strength';

            list.innerHTML = `<p style="color:#e94560; font-size:0.85rem; margin-bottom:10px; font-weight:bold;">${typeLabel} Fields</p>` +
                currentSettings.map(field => {
                    const isCustom = !defaults.find(f => f.key === field.key);
                    const removeBtn = isCustom ? `<button class="field-remove" onclick="removeCustomField('${field.key}')">✕</button>` : '';
                    return `
                        <div class="field-setting-item" draggable="true" data-key="${field.key}">
                            <span class="field-drag">☰</span>
                            <span class="field-name">${escapeHtml(field.label)}</span>
                            ${removeBtn}
                            <input type="checkbox" class="field-toggle" ${field.enabled ? 'checked' : ''}>
                        </div>
                    `;
                }).join('');
            setupFieldsDragReorder();
        }

        function addCustomField() {
            const input = document.getElementById('new-field-name');
            const name = input.value.trim();
            if (!name) return;

            const key = 'custom_' + name.toLowerCase().replace(/[^a-z0-9]/g, '_') + '_' + Date.now();
            const newField = {
                key: key,
                label: name,
                type: 'text',
                placeholder: '',
                default: '',
                wide: false,
                enabled: true
            };

            if (currentEntryType === 'cardio') {
                cardioFieldSettings.push(newField);
            } else {
                fieldSettings.push(newField);
            }
            input.value = '';
            renderFieldSettingsList();
        }

        function removeCustomField(key) {
            if (currentEntryType === 'cardio') {
                cardioFieldSettings = cardioFieldSettings.filter(f => f.key !== key);
            } else {
                fieldSettings = fieldSettings.filter(f => f.key !== key);
            }
            renderFieldSettingsList();
        }

        function setupFieldsDragReorder() {
            const list = document.getElementById('fields-settings-list');
            let dragEl = null;

            list.querySelectorAll('.field-setting-item').forEach(item => {
                item.addEventListener('dragstart', (e) => {
                    dragEl = item;
                    item.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });

                item.addEventListener('dragend', () => {
                    item.classList.remove('dragging');
                    dragEl = null;
                });

                item.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    if (dragEl && dragEl !== item) {
                        const rect = item.getBoundingClientRect();
                        const midY = rect.top + rect.height / 2;
                        if (e.clientY < midY) {
                            list.insertBefore(dragEl, item);
                        } else {
                            list.insertBefore(dragEl, item.nextSibling);
                        }
                    }
                });

                // Touch support
                item.addEventListener('touchstart', (e) => {
                    dragEl = item;
                    item.classList.add('dragging');
                });

                item.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const touchY = e.touches[0].clientY;
                    const items = Array.from(list.querySelectorAll('.field-setting-item'));
                    for (const other of items) {
                        if (other === dragEl) continue;
                        const rect = other.getBoundingClientRect();
                        if (touchY > rect.top && touchY < rect.bottom) {
                            const midY = rect.top + rect.height / 2;
                            if (touchY < midY) {
                                list.insertBefore(dragEl, other);
                            } else {
                                list.insertBefore(dragEl, other.nextSibling);
                            }
                            break;
                        }
                    }
                }, { passive: false });

                item.addEventListener('touchend', () => {
                    item.classList.remove('dragging');
                    dragEl = null;
                });
            });
        }

        // Close fields modal on overlay click
        document.getElementById('fields-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('fields-modal')) closeFieldSettings();
        });

        // Initial render of dynamic fields
        renderDynamicFields();

        // Select all text on focus for number and text inputs in forms/modals
        document.addEventListener('focus', (e) => {
            if (e.target.matches('input[type="number"], input[type="text"]') &&
                (e.target.closest('.workout-form') || e.target.closest('.modal'))) {
                e.target.select();
            }
        }, true);

        function saveEntries() {
            localStorage.setItem(ENV_PREFIX + 'yeahBuddyEntries', JSON.stringify(entries));
        }

        function saveDayNotes() {
            localStorage.setItem(ENV_PREFIX + 'yeahBuddyDayNotes', JSON.stringify(dayNotes));
        }

        function saveCollapsed() {
            localStorage.setItem(ENV_PREFIX + 'yeahBuddyCollapsed', JSON.stringify(collapsedWeeks));
        }

        // Get ISO week number and year
        function getWeekInfo(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            return { year: d.getUTCFullYear(), week: weekNo };
        }

        // Get week start date (Monday)
        function getWeekStart(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(date);
            monday.setDate(diff);
            return monday;
        }

        // Get full day name
        function getDayName(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            return date.toLocaleDateString('en-US', { weekday: 'long' });
        }

        // Format date for display
        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            return date.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
        }

        // RPE class
        function getRpeClass(rpe) {
            if (rpe <= 6) return 'rpe-low';
            if (rpe <= 8) return 'rpe-mid';
            return 'rpe-high';
        }

        // Intensity badge class
        function getIntensityClass(intensity) {
            switch (intensity) {
                case 'Alright': return 'intensity-alright';
                case 'Wooo': return 'intensity-wooo';
                case 'Lightweight Baby': return 'intensity-lightweight-baby';
                default: return 'intensity-wooo';
            }
        }

        // Group entries by week
        function groupByWeek() {
            const weeks = {};

            entries.forEach(entry => {
                const { year, week } = getWeekInfo(entry.date);
                const key = `${year}-W${String(week).padStart(2, '0')}`;
                if (!weeks[key]) {
                    weeks[key] = {
                        key: key,
                        year: year,
                        week: week,
                        weekStart: getWeekStart(entry.date),
                        entries: []
                    };
                }
                weeks[key].entries.push(entry);
            });

            // Sort entries within each week by date, preserving array order for same date
            Object.values(weeks).forEach(w => {
                w.entries.sort((a, b) => a.date.localeCompare(b.date));
            });

            // Sort weeks descending (most recent first)
            return Object.values(weeks).sort((a, b) => b.key.localeCompare(a.key));
        }

        // Render all weeks
        function renderWeeks() {
            const weeks = groupByWeek();

            if (weeks.length === 0) {
                weeksContainer.innerHTML = '<div class="empty-state"><p>No workouts logged yet.</p><p>Get after it! 💪</p></div>';
                return;
            }

            // Determine current week key
            const today = getTodayBrazil();
            const { year: curYear, week: curWeek } = getWeekInfo(today);
            const currentWeekKey = `${curYear}-W${String(curWeek).padStart(2, '0')}`;

            // All weeks sorted ascending (oldest first) for numbering
            const allSorted = [...weeks].sort((a, b) => a.key.localeCompare(b.key));

            // Separate past and current
            const pastWeeks = allSorted.filter(w => w.key !== currentWeekKey);
            const currentWeekArr = allSorted.filter(w => w.key === currentWeekKey);

            // Display order: current week on top, then past weeks (oldest first)
            const ordered = [...currentWeekArr, ...pastWeeks];

            weeksContainer.innerHTML = ordered.map((week) => {
                const weekNumber = allSorted.findIndex(w => w.key === week.key) + 1;
                const isCurrent = week.key === currentWeekKey;
                const isCollapsed = collapsedWeeks[week.key] === true;
                const weekEnd = new Date(week.weekStart);
                weekEnd.setDate(weekEnd.getDate() + 6);
                const startStr = week.weekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const endStr = weekEnd.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                const totalExercises = week.entries.length;
                const uniqueDays = new Set(week.entries.map(e => e.date)).size;
                const weekLabel = `Week ${weekNumber}`;
                const pastClass = isCurrent ? '' : 'past-week';

                const todayBtnLabel = showTodayOnly ? '📅 Show Week' : '📍 Show Today';
                const todayStr = getTodayBrazil();
                const hasTodayEntries = isCurrent && week.entries.some(e => e.date === todayStr);
                const todayBtnDisabled = !hasTodayEntries && !showTodayOnly;
                const todayBtnStyle = todayBtnDisabled
                    ? 'background:#555;color:#888;cursor:not-allowed;'
                    : 'background:#e94560;color:#fff;';

                return `
                    <div class="week-section ${pastClass}">
                        <div class="week-header" onclick="toggleWeek('${week.key}')">
                            <div>
                                <h3>${weekLabel} <span style="color:#888;font-size:0.75rem;font-weight:normal;">— ${startStr} to ${endStr}</span></h3>
                            </div>
                            <div style="display:flex;align-items:center;gap:12px;">
                                ${isCurrent ? `<button class="btn btn-small" style="${todayBtnStyle}font-size:0.65rem;" onclick="event.stopPropagation(); ${todayBtnDisabled ? '' : 'toggleTodayOnly()'}" ${todayBtnDisabled ? 'disabled' : ''}>${todayBtnLabel}</button>` : ''}
                ${!isCollapsed ? `<button class="btn btn-danger btn-small" onclick="event.stopPropagation(); deleteWeek('${week.key}')" title="Delete week" style="font-size:0.9rem;padding:4px 8px;">✕</button>` : ''}
                                <span class="toggle-icon ${isCollapsed ? 'collapsed' : ''}">▼</span>
                            </div>
                        </div>
                        <div class="week-body ${isCollapsed ? 'collapsed' : ''}">
                            ${renderWeekDays(week.entries)}
                        </div>
                    </div>
                `;
            }).join('');

            // Re-apply today-only filter if active
            if (showTodayOnly) {
                setTimeout(() => {
                    const dayBlocks = document.querySelectorAll('.day-block');
                    dayBlocks.forEach(block => {
                        if (!block.classList.contains('day-today')) {
                            block.style.display = 'none';
                        }
                    });
                }, 0);
            }
        }

        // Day background color by weekday
        function getDayBgClass(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            const days = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
            return 'day-bg-' + days[date.getDay()];
        }

        // Render days for a week: each day = header bar + table + note bar
        function renderWeekDays(weekEntries) {

            const days = [];

                    cardioTable = `

                            <div>
                                <button class="btn-reorder" onclick="openReorderModal('${day.date}')" title="Edit Day">⚙️</button>

        // Cycle intensity on badge click
        function cycleIntensity(dateKey) {
            const levels = ['Alright', 'Wooo', 'Lightweight Baby'];
            const dayEntries = entries.filter(e => e.date === dateKey);
            if (dayEntries.length === 0) return;

            const current = dayEntries[0].intensity;
            const idx = levels.indexOf(current);
            const next = levels[(idx + 1) % levels.length];

            dayEntries.forEach(e => { e.intensity = next; });
            saveEntries();
            renderWeeks();
        }

        function editDayNote(dateKey) {
            const currentNote = dayNotes[dateKey] || '';
            const newNote = prompt('Training Note:', currentNote);
            if (newNote !== null) {
                dayNotes[dateKey] = newNote.trim();
                saveDayNotes();
                renderWeeks();
            }
        }

        function toggleWeek(key) {

        let showTodayOnly = false;

        // Delete all entries from a week
        function deleteWeek(weekKey) {
            if (!confirm('Are you sure you want to delete ALL exercises from this week? This cannot be undone.')) return;
            entries = entries.filter(e => {
                const { year, week } = getWeekInfo(e.date);
                return `${year}-W${String(week).padStart(2, '0')}` !== weekKey;
            });
            saveEntries();
            renderWeeks();
        }

        // Save a week as a reusable template (shared across environments)
        let savedTemplates = JSON.parse(localStorage.getItem('yeahBuddyTemplates')) || [];
        // Migrate from old prefixed key if exists
        if (savedTemplates.length === 0) {
            const oldTemplates = JSON.parse(localStorage.getItem(ENV_PREFIX + 'yeahBuddyTemplates')) || [];
            if (oldTemplates.length > 0) {
                savedTemplates = oldTemplates;
                localStorage.setItem('yeahBuddyTemplates', JSON.stringify(savedTemplates));
            }
        }

        function saveTemplates() {
            localStorage.setItem('yeahBuddyTemplates', JSON.stringify(savedTemplates));
        }

        function saveWeekAsTemplate(weekKey) {
            const name = prompt('Template name:', 'My Training Week');
            if (!name) return;

            const weekEntries = entries.filter(e => {
                const { year, week } = getWeekInfo(e.date);
                return `${year}-W${String(week).padStart(2, '0')}` === weekKey;
            });

            if (weekEntries.length === 0) {
                alert('No exercises in this week to save.');
                return;
            }

            // Group by day of week (0-6) to store structure
            const mondayOfWeek = getWeekStart(weekEntries[0].date);
            const days = {};
            weekEntries.forEach(e => {
                const date = new Date(e.date + 'T00:00:00');
                const dayOffset = Math.round((date - mondayOfWeek) / 86400000);
                if (!days[dayOffset]) days[dayOffset] = { dayOffset, intensity: e.intensity, exercises: [] };
                days[dayOffset].exercises.push({
                    exercise: e.exercise,
                    sets: e.sets,
                    reps: e.reps,
                    load: e.load,
                    rpe: e.rpe,
                    inter: e.inter,
                    note: e.note || '',
                    primaryMuscle: e.primaryMuscle || '',
                    secondaryMuscle: e.secondaryMuscle || '',
                    tertiaryMuscle: e.tertiaryMuscle || '',
                    quaternaryMuscle: e.quaternaryMuscle || ''
                });
            });

            savedTemplates.push({
                id: Date.now(),
                name: name.trim(),
                days: Object.values(days)
            });

            saveTemplates();
            alert('Template "' + name.trim() + '" saved!');

            const templateId = parseInt(selectedKey.replace('__template_', '').replace('__', ''));

        function saveCurrentPreviewAsTemplate() {
            if (generateWeekData.length === 0) {
                alert('Nothing to save. Load a week first.');
                return;
            }

            // Read edited values from DOM before saving
            const container = document.getElementById('generate-preview');
            const inputs = container.querySelectorAll('.gen-exercise-row input');
            inputs.forEach(input => {
                const dayIdx = parseInt(input.dataset.day);
                const exIdx = parseInt(input.dataset.ex);
                const field = input.dataset.field;
                if (isNaN(dayIdx) || isNaN(exIdx) || !field) return;
                const ex = generateWeekData[dayIdx].exercises[exIdx];
                if (!ex) return;
                if (input.type === 'number') {
                    ex[field] = parseFloat(input.value) || 0;
                } else {
                    ex[field] = input.value.trim();
                }
            });

            const name = prompt('Template name:', 'My Training Week');
            if (!name) return;

            // Get current week's Monday for offset calculation
            const today = new Date();
            const todayDay = today.getDay();
            const mondayOffset = todayDay === 0 ? -6 : 1 - todayDay;
            const currentMonday = new Date(today);
            currentMonday.setDate(today.getDate() + mondayOffset);

            const days = generateWeekData.map(day => {
                const dayDate = new Date(day.date + 'T00:00:00');
                const dayOff = Math.round((dayDate - currentMonday) / 86400000);
                return {
                    dayOffset: dayOff,
                    intensity: day.intensity,
                    exercises: day.exercises.map(e => ({ ...e }))
                };
            });

            savedTemplates.push({
                id: Date.now(),
                name: name.trim(),
                days: days
            });

            saveTemplates();
            alert('Template "' + name.trim() + '" saved!');
        }

        // Delete entry
        function deleteEntry(id) {
            if (!confirm('Delete this entry?')) return;
            entries = entries.filter(e => e.id !== id);
            saveEntries();
            renderWeeks();

        // Duplicate entry (insert copy right after the original)
        function duplicateEntry(id) {
            const idx = entries.findIndex(e => Number(e.id) === Number(id));
            if (idx === -1) return;
            const original = entries[idx];
            const copy = { ...original, id: Date.now() + Math.random() * 10000 };
            entries.splice(idx + 1, 0, copy);

            renderWeeks();

        // Edit entry
        function editEntry(id) {

            document.getElementById('edit-id').value = id;

            document.getElementById('edit-sets').value = entry.sets;

        function saveEdit() {

            const entry = entries.find(e => Number(e.id) === id);
            if (!entry) return;

            const oldDate = entry.date;

        // Close modal on overlay click
        document.getElementById('edit-modal').addEventListener('click', (e) => {

        document.getElementById('reorder-modal').addEventListener('click', (e) => {

        // Reorder modal
        let reorderDate = null;
        let reorderIds = [];

        function openReorderModal(dateKey) {
            reorderDate = dateKey;
            const dayEntries = entries.filter(e => e.date === dateKey);
            reorderIds = dayEntries.map(e => e.id);

            // Populate date and intensity
            document.getElementById('reorder-date').value = dateKey;
            const dayIntensity = dayEntries.length > 0 ? dayEntries[0].intensity : 'Wooo';
            document.getElementById('reorder-intensity').value = dayIntensity;

            const list = document.getElementById('reorder-list');
            list.innerHTML = dayEntries.map(entry => `
                <div class="reorder-item" draggable="true" data-id="${entry.id}">
                    <span class="drag-handle">☰</span>
                    <span class="reorder-name">${exerciseWithEmoji(entry.exercise)}</span>
                    <span class="reorder-detail">${entry.sets}×${entry.reps} @ ${entry.load}kg</span>
                </div>
            `).join('');

            // Setup drag events
            setupDragReorder();

        function closeReorderModal() {
            document.getElementById('reorder-modal').classList.remove('active');

        }

        function saveReorder() {
            // Get updated date and intensity
            const newDate = document.getElementById('reorder-date').value;
            const newIntensity = document.getElementById('reorder-intensity').value;

            // Get the new order from DOM
            const items = document.querySelectorAll('#reorder-list .reorder-item');
            const newOrder = Array.from(items).map(el => Number(el.dataset.id));

            // Reordered day entries
            const dayEntries = newOrder.map(id => entries.find(e => Number(e.id) === id)).filter(Boolean);

            // Update date and intensity on all day entries
            dayEntries.forEach(e => {
                e.date = newDate;
                e.intensity = newIntensity;
            });

            // Find the indices of entries for this date in the original array
            const otherEntries = entries.filter(e => e.date !== reorderDate);

            // Find where the first entry of this date was in the original array
            const firstIdx = entries.indexOf(entries.find(e => e.date === reorderDate));

            // Count how many non-date entries come before firstIdx
            let insertAt = 0;
            for (let i = 0; i < firstIdx; i++) {
                if (entries[i].date !== reorderDate) insertAt++;
            }

            // Rebuild: insert reordered day entries at the correct position
            entries = [
                ...otherEntries.slice(0, insertAt),
                ...dayEntries,
                ...otherEntries.slice(insertAt)
            ];

            saveEntries();
            renderWeeks();
            closeReorderModal();
        }

        function setupDragReorder() {
            const list = document.getElementById('reorder-list');
            let dragEl = null;

            list.querySelectorAll('.reorder-item').forEach(item => {
                item.addEventListener('dragstart', (e) => {
                    dragEl = item;
                    item.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });

                item.addEventListener('dragend', () => {
                    item.classList.remove('dragging');
                    dragEl = null;
                });

                item.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    if (dragEl && dragEl !== item) {
                        const rect = item.getBoundingClientRect();
                        const midY = rect.top + rect.height / 2;
                        if (e.clientY < midY) {
                            list.insertBefore(dragEl, item);
                        } else {
                            list.insertBefore(dragEl, item.nextSibling);
                        }
                    }
                });

                // Touch support for mobile
                let touchStartY = 0;
                let touchClone = null;

                item.addEventListener('touchstart', (e) => {
                    dragEl = item;
                    touchStartY = e.touches[0].clientY;
                    item.classList.add('dragging');
                });

                item.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const touchY = e.touches[0].clientY;
                    const items = Array.from(list.querySelectorAll('.reorder-item'));
                    for (const other of items) {
                        if (other === dragEl) continue;
                        const rect = other.getBoundingClientRect();
                        const midY = rect.top + rect.height / 2;
                        if (touchY > rect.top && touchY < rect.bottom) {
                            if (touchY < midY) {
                                list.insertBefore(dragEl, other);
                            } else {
                                list.insertBefore(dragEl, other.nextSibling);
                            }
                            break;
                        }
                    }
                }, { passive: false });

                item.addEventListener('touchend', () => {
                    item.classList.remove('dragging');
                    dragEl = null;
                });
            });
        }

        // Escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Add emoji suffix to exercise names
        function exerciseWithEmoji(name) {
            const lower = name.toLowerCase();
            let emoji = '';
            if (lower.includes('bench')) emoji = ' 💪';
            else if (lower.includes('squat')) emoji = ' 🦵';
            else if (lower.includes('deadlift')) emoji = ' 💀';
            else if (lower.includes('run')) emoji = ' 🏃';
            else if (lower.includes('cycl') || lower.includes('bike')) emoji = ' 🚴';
            else if (lower.includes('swim')) emoji = ' 🏊';
            else if (lower.includes('row')) emoji = ' 🚣';
            return escapeHtml(name) + emoji;
        }

        // Generate Week Modal
        let generateWeekData = []; // Array of { dayName, date, intensity, exercises: [...] }

        function openGenerateWeek() {
            const weeks = groupByWeek();
            const select = document.getElementById('generate-source-week');

            // All weeks sorted ascending for numbering
            const allSorted = [...weeks].sort((a, b) => a.key.localeCompare(b.key));

            // Determine current week key
            const todayStr = getTodayBrazil();
            const { year: curYear, week: curWeek } = getWeekInfo(todayStr);
            const currentWeekKey = `${curYear}-W${String(curWeek).padStart(2, '0')}`;

            let options = '';

            // Saved templates first
            if (savedTemplates.length > 0) {
                options += '<optgroup label="📋 Saved Templates">';
                savedTemplates.forEach(t => {
                    options += `<option value="__template_${t.id}__">⭐ ${escapeHtml(t.name)}</option>`;
                });
                options += '</optgroup>';
            }

            // Live weeks
            options += '<optgroup label="📅 From History">';
            const hasCurrentWeek = allSorted.some(w => w.key === currentWeekKey);
            if (hasCurrentWeek) {
                options += `<option value="${currentWeekKey}">📍 Current Week</option>`;
            }
            options += '<option value="__last__">Most Recent Week</option>';
            allSorted.forEach((week, idx) => {
                const weekNumber = idx + 1;
                const startStr = week.weekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const weekEnd = new Date(week.weekStart);
                weekEnd.setDate(weekEnd.getDate() + 6);
                const endStr = weekEnd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const isCurrent = week.key === currentWeekKey;
                if (!isCurrent) {
                    options += `<option value="${week.key}">Week ${weekNumber} — ${startStr} to ${endStr}</option>`;
                }
            });
            options += '</optgroup>';

            select.innerHTML = options;

            loadGeneratePreview();
            document.getElementById('generate-week-modal').classList.add('active');
        }

        function closeGenerateWeek() {
            document.getElementById('generate-week-modal').classList.remove('active');
            generateWeekData = [];
        }

        function loadGeneratePreview() {
            const select = document.getElementById('generate-source-week');
            const selectedKey = select.value;

            // Get current week's Monday
            const today = new Date();
            const todayDay = today.getDay();
            const mondayOffset = todayDay === 0 ? -6 : 1 - todayDay;
            const currentMonday = new Date(today);
            currentMonday.setDate(today.getDate() + mondayOffset);

            generateWeekData = [];

            // Check if a template is selected
            if (selectedKey && selectedKey.startsWith('__template_')) {
                const templateId = parseInt(selectedKey.replace('__template_', '').replace('__', ''));
                const template = savedTemplates.find(t => t.id === templateId);

                if (template) {
                    template.days.forEach(day => {
                        const newDate = new Date(currentMonday);
                        newDate.setDate(currentMonday.getDate() + day.dayOffset);
                        const newDateStr = newDate.toISOString().split('T')[0];
                        const dayName = newDate.toLocaleDateString('en-US', { weekday: 'long' });

                        generateWeekData.push({
                            dayName: dayName,
                            date: newDateStr,
                            intensity: day.intensity || 'Wooo',
                            exercises: day.exercises.map(e => ({ ...e }))
                        });
                    });
                }
            } else {
                // Load from live week entries
                const weeks = groupByWeek();
                const allSorted = [...weeks].sort((a, b) => a.key.localeCompare(b.key));

                let sourceWeek;
                if (selectedKey === '__last__' || !selectedKey) {
                    sourceWeek = allSorted.length > 0 ? allSorted[allSorted.length - 1] : null;
                } else {
                    sourceWeek = allSorted.find(w => w.key === selectedKey);
                }

                if (sourceWeek && sourceWeek.entries.length > 0) {
                    const sourceMonday = sourceWeek.weekStart;

                    // Group source entries by date
                    const dayGroups = {};
                    sourceWeek.entries.forEach(entry => {
                        if (!dayGroups[entry.date]) dayGroups[entry.date] = [];
                        dayGroups[entry.date].push(entry);
                    });

                    Object.keys(dayGroups).sort().forEach(dateStr => {
                        const srcDate = new Date(dateStr + 'T00:00:00');
                        const dayDiff = Math.round((srcDate - sourceMonday) / 86400000);
                        const newDate = new Date(currentMonday);
                        newDate.setDate(currentMonday.getDate() + dayDiff);
                        const newDateStr = newDate.toISOString().split('T')[0];
                        const dayName = newDate.toLocaleDateString('en-US', { weekday: 'long' });

                        const dayData = {
                            dayName: dayName,
                            date: newDateStr,
                            intensity: dayGroups[dateStr][0].intensity || 'Wooo',
                            exercises: dayGroups[dateStr].map(e => ({
                                exercise: e.exercise || '',
                                sets: e.sets || 3,
                                reps: e.reps || 10,
                                load: e.load || 0,
                                rpe: e.rpe || 7,
                                inter: e.inter || 2,
                                note: e.note || ''
                            }))
                        };
                        generateWeekData.push(dayData);
                    });
                }
            }

            renderGeneratePreview();
        }

        function renderGeneratePreview() {
            const container = document.getElementById('generate-preview');

            if (generateWeekData.length === 0) {
                container.innerHTML = '<p style="color:#aaa; text-align:center; padding:20px;">No data to generate from. Add exercises first!</p>';
                return;
            }

            container.innerHTML = generateWeekData.map((day, dayIdx) => {
                const exercisesHtml = day.exercises.map((ex, exIdx) => `
                    <div class="gen-exercise-row">
                        <input type="text" value="${escapeHtml(ex.exercise)}" data-day="${dayIdx}" data-ex="${exIdx}" data-field="exercise" placeholder="Exercise">
                        <input type="number" value="${ex.sets}" data-day="${dayIdx}" data-ex="${exIdx}" data-field="sets" title="Sets" min="1" step="1">
                        <input type="number" value="${ex.reps}" data-day="${dayIdx}" data-ex="${exIdx}" data-field="reps" title="Reps" min="1" step="1">
                        <input type="number" value="${ex.load}" data-day="${dayIdx}" data-ex="${exIdx}" data-field="load" title="Load (Kg)" min="0" step="0.5">
                        <input type="number" value="${ex.rpe}" data-day="${dayIdx}" data-ex="${exIdx}" data-field="rpe" title="RPE" min="1" max="10" step="0.5">
                        <input type="number" value="${ex.inter}" data-day="${dayIdx}" data-ex="${exIdx}" data-field="inter" title="Rest (min)" min="0" step="0.5">
                        <button class="gen-remove-btn" onclick="removeGenExercise(${dayIdx}, ${exIdx})">✕</button>
                    </div>
                `).join('');

                return `
                    <div class="gen-day-section">
                        <div class="gen-day-header">
                            ${escapeHtml(day.dayName)} — ${formatDate(day.date)}
                            <select onchange="generateWeekData[${dayIdx}].intensity = this.value" style="margin-left:10px; padding:3px 8px; border-radius:4px; background:#16213e; color:#eee; border:1px solid #0f3460; font-size:0.8rem;">
                                <option value="Alright" ${day.intensity === 'Alright' ? 'selected' : ''}>Alright</option>
                                <option value="Wooo" ${day.intensity === 'Wooo' ? 'selected' : ''}>Wooo</option>
                                <option value="Lightweight Baby" ${day.intensity === 'Lightweight Baby' ? 'selected' : ''}>Lightweight Baby</option>
                            </select>
                        </div>
                        ${exercisesHtml}
                        <button class="gen-add-exercise-btn" onclick="addGenExercise(${dayIdx})">+ Add Exercise</button>
                    </div>
                `;
            }).join('');
        }

        function removeGenExercise(dayIdx, exIdx) {
            generateWeekData[dayIdx].exercises.splice(exIdx, 1);
            renderGeneratePreview();
        }

        function addGenExercise(dayIdx) {
            generateWeekData[dayIdx].exercises.push({
                exercise: '', sets: 3, reps: 10, load: 0, rpe: 7, inter: 2, note: ''
            });
            renderGeneratePreview();
        }

        function saveGenerateWeek() {
            // Read all edited values from the DOM
            const container = document.getElementById('generate-preview');
            const inputs = container.querySelectorAll('.gen-exercise-row input');

            inputs.forEach(input => {
                const dayIdx = parseInt(input.dataset.day);
                const exIdx = parseInt(input.dataset.ex);
                const field = input.dataset.field;
                if (isNaN(dayIdx) || isNaN(exIdx) || !field) return;

                const ex = generateWeekData[dayIdx].exercises[exIdx];
                if (!ex) return;

                if (input.type === 'number') {
                    ex[field] = parseFloat(input.value) || 0;
                } else {
                    ex[field] = input.value.trim();
                }
            });

            // Create entries
            generateWeekData.forEach(day => {
                day.exercises.forEach(ex => {
                    if (!ex.exercise) return; // skip empty exercises
                    entries.push({
                        id: Date.now() + Math.random() * 10000,
                        date: day.date,
                        intensity: day.intensity,
                        exercise: ex.exercise,
                        sets: ex.sets,
                        reps: ex.reps,
                        load: ex.load,
                        rpe: ex.rpe,
                        inter: ex.inter,
                        note: ex.note
                    });
                });
            });

            saveEntries();
            renderWeeks();
            closeGenerateWeek();
        }

        // Close generate modal on overlay click
        document.getElementById('generate-week-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('generate-week-modal')) closeGenerateWeek();
        });

        // Initial render
        renderWeeks();

            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));

            document.querySelectorAll('.dash-nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('dash-btn-' + type).classList.add('active');

        function renderChart(type) {
            const area = document.getElementById('chart-area');
            switch(type) {
                case 'volume': area.innerHTML = renderVolumeChart(); break;
                case 'frequency': area.innerHTML = renderFrequencyChart(); break;
                case 'exercises': area.innerHTML = renderTopExercisesChart(); break;
                case 'progress': area.innerHTML = renderProgressChart(); break;
                case 'e1rm': area.innerHTML = renderE1rmChart(); break;
                case 'tonnage': area.innerHTML = renderTonnageChart(); break;
