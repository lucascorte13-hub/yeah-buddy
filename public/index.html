        function getWeeklyData() {
            const weeks = groupByWeek();
            const allSorted = [...weeks].sort((a, b) => a.key.localeCompare(b.key));
            return allSorted.slice(-8); // Last 8 weeks
        }

        function renderVolumeChart() {
            const weeks = getWeeklyData();
            if (weeks.length === 0) return '<p style="color:#aaa;text-align:center;padding:40px;">No data yet</p>';

            const volumes = weeks.map(w => {
                const vol = w.entries.filter(e => e.entryType !== 'cardio')
                    .reduce((sum, e) => sum + ((e.sets || 0) * (e.reps || 0) * (e.load || 0)), 0);
                return { label: 'W' + (weeks.indexOf(w) + 1), value: vol };
            });

            const maxVol = Math.max(...volumes.map(v => v.value), 1);
            const totalVol = volumes.reduce((s, v) => s + v.value, 0);
            const avgVol = Math.round(totalVol / volumes.length);

            let html = `<div class="chart-title">📊 Weekly Volume (kg × reps × sets)</div>`;
            html += `<div class="stats-summary">
                <div class="stat-box"><div class="stat-value">${totalVol.toLocaleString()}</div><div class="stat-label">Total Volume</div></div>
                <div class="stat-box"><div class="stat-value">${avgVol.toLocaleString()}</div><div class="stat-label">Avg / Week</div></div>
                <div class="stat-box"><div class="stat-value">${volumes.length}</div><div class="stat-label">Weeks Tracked</div></div>
            </div>`;
            html += `<div class="chart-canvas"><div class="bar-chart">`;
            volumes.forEach(v => {
                const height = maxVol > 0 ? (v.value / maxVol * 100) : 0;
                html += `<div class="bar-item">
                    <span class="bar-value">${v.value > 0 ? v.value.toLocaleString() : '-'}</span>
                    <div class="bar" style="height:${height}%;background:linear-gradient(to top, #e94560, #ff6b6b);"></div>
                    <span class="bar-label">${v.label}</span>
                </div>`;
            });
            html += `</div></div>`;
            return html;
        }

        function renderFrequencyChart() {
            const weeks = getWeeklyData();
            if (weeks.length === 0) return '<p style="color:#aaa;text-align:center;padding:40px;">No data yet</p>';

            const frequencies = weeks.map(w => {
                const days = new Set(w.entries.map(e => e.date)).size;
                return { label: 'W' + (weeks.indexOf(w) + 1), value: days };
            });

            const maxFreq = Math.max(...frequencies.map(v => v.value), 1);
            const avgFreq = (frequencies.reduce((s, v) => s + v.value, 0) / frequencies.length).toFixed(1);

            let html = `<div class="chart-title">📅 Training Frequency (days/week)</div>`;
            html += `<div class="stats-summary">
                <div class="stat-box"><div class="stat-value">${avgFreq}</div><div class="stat-label">Avg Days / Week</div></div>
                <div class="stat-box"><div class="stat-value">${Math.max(...frequencies.map(v => v.value))}</div><div class="stat-label">Best Week</div></div>
            </div>`;
            html += `<div class="chart-canvas"><div class="bar-chart">`;
            frequencies.forEach(v => {
                const height = maxFreq > 0 ? (v.value / maxFreq * 100) : 0;
                html += `<div class="bar-item">
                    <span class="bar-value">${v.value}</span>
                    <div class="bar" style="height:${height}%;background:linear-gradient(to top, #3498db, #5dade2);"></div>
                    <span class="bar-label">${v.label}</span>
                </div>`;
            });
            html += `</div></div>`;
            return html;
        }

        function renderTopExercisesChart() {
            const strengthEntries = entries.filter(e => e.entryType !== 'cardio' && e.exercise);
            if (strengthEntries.length === 0) return '<p style="color:#aaa;text-align:center;padding:40px;">No data yet</p>';

            const counts = {};
            strengthEntries.forEach(e => { counts[e.exercise] = (counts[e.exercise] || 0) + 1; });
            const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 10);
            const maxCount = sorted[0][1];

            let html = `<div class="chart-title">🏋️ Top 10 Exercises</div>`;
            html += `<div class="chart-canvas"><div class="bar-chart">`;
            sorted.forEach(([name, count]) => {
                const height = (count / maxCount * 100);
                html += `<div class="bar-item">
                    <span class="bar-value">${count}</span>
                    <div class="bar" style="height:${height}%;background:linear-gradient(to top, #2ecc71, #58d68d);"></div>
                    <span class="bar-label">${escapeHtml(name.substring(0, 8))}</span>
                </div>`;
            });
            html += `</div></div>`;
            return html;
        }

        function renderProgressChart() {
            const strengthEntries = entries.filter(e => e.entryType !== 'cardio' && e.exercise && e.load > 0);
            if (strengthEntries.length === 0) return '<p style="color:#aaa;text-align:center;padding:40px;">No data yet</p>';

            // Get top exercises by frequency and show max load over time
            const exerciseMaxLoads = {};
            strengthEntries.forEach(e => {
                if (!exerciseMaxLoads[e.exercise]) exerciseMaxLoads[e.exercise] = [];
                exerciseMaxLoads[e.exercise].push({ date: e.date, load: e.load });
            });

            const topExercises = Object.entries(exerciseMaxLoads)
                .sort((a, b) => b[1].length - a[1].length)
                .slice(0, 5);

            let html = `<div class="chart-title">📈 Load Progress (Top Exercises - Max Load)</div>`;
            html += `<div class="stats-summary">`;
            topExercises.forEach(([name, records]) => {
                const maxLoad = Math.max(...records.map(r => r.load));
                html += `<div class="stat-box"><div class="stat-value">${maxLoad} kg</div><div class="stat-label">${escapeHtml(name)}</div></div>`;
            });
            html += `</div>`;
            return html;
        }

        // Estimated 1RM (Epley formula: weight × (1 + reps/30))
        function calcE1rm(weight, reps) {
            if (reps <= 0 || weight <= 0) return 0;
            if (reps === 1) return weight;
            return Math.round(weight * (1 + reps / 30) * 10) / 10;
        }

        function renderE1rmChart() {
            const strengthEntries = entries.filter(e => e.entryType !== 'cardio' && e.exercise && e.load > 0);
            if (strengthEntries.length === 0) return '<p style="color:#aaa;text-align:center;padding:40px;">No data yet</p>';

            // Calculate e1RM for each entry, group by exercise, show best per week
            const exerciseE1rms = {};
            strengthEntries.forEach(e => {
                const e1rm = calcE1rm(e.load, e.reps || 1);
                if (!exerciseE1rms[e.exercise]) exerciseE1rms[e.exercise] = [];
                exerciseE1rms[e.exercise].push({ date: e.date, e1rm });
            });

            // Top 5 exercises by max e1RM
            const topExercises = Object.entries(exerciseE1rms)
                .map(([name, records]) => ({ name, max: Math.max(...records.map(r => r.e1rm)), records }))
                .sort((a, b) => b.max - a.max)
                .slice(0, 5);

            let html = `<div class="chart-title">🧮 Estimated 1RM (Epley Formula)</div>`;
            html += `<p style="color:#666;font-size:0.75rem;margin-bottom:15px;">e1RM = weight × (1 + reps ÷ 30). Shows your top exercises and current estimated max.</p>`;
            html += `<div class="stats-summary">`;
            topExercises.forEach(ex => {
                const latest = ex.records.sort((a, b) => b.date.localeCompare(a.date))[0];
                html += `<div class="stat-box"><div class="stat-value">${ex.max} kg</div><div class="stat-label">${escapeHtml(ex.name)}</div></div>`;
            });
            html += `</div>`;

            // Show e1RM progression for top exercise
            if (topExercises.length > 0) {
                const best = topExercises[0];
                const weeklyE1rm = {};
                best.records.forEach(r => {
                    const { year, week } = getWeekInfo(r.date);
                    const key = `${year}-W${String(week).padStart(2, '0')}`;
                    if (!weeklyE1rm[key] || r.e1rm > weeklyE1rm[key]) weeklyE1rm[key] = r.e1rm;
                });
                const weekKeys = Object.keys(weeklyE1rm).sort().slice(-10);
                const values = weekKeys.map(k => weeklyE1rm[k]);
                const maxVal = Math.max(...values, 1);

                html += `<div class="chart-title" style="font-size:0.95rem;margin-top:20px;">e1RM Progression — ${escapeHtml(best.name)}</div>`;
                html += `<div class="chart-canvas"><div class="bar-chart">`;
                weekKeys.forEach((k, i) => {
                    const val = values[i];
                    const height = (val / maxVal * 100);
                    html += `<div class="bar-item">
                        <span class="bar-value">${val}</span>
                        <div class="bar" style="height:${height}%;background:linear-gradient(to top, #9b59b6, #c39bd3);"></div>
                        <span class="bar-label">W${i + 1}</span>
                    </div>`;
                });
                html += `</div></div>`;
            }

            return html;
        }

        function renderTonnageChart() {
            const strengthEntries = entries.filter(e => e.entryType !== 'cardio' && e.exercise);
            if (strengthEntries.length === 0) return '<p style="color:#aaa;text-align:center;padding:40px;">No data yet</p>';

            // Tonnage per session (date)
            const sessionTonnage = {};
            strengthEntries.forEach(e => {
                const tonnage = (e.sets || 0) * (e.reps || 0) * (e.load || 0);
                sessionTonnage[e.date] = (sessionTonnage[e.date] || 0) + tonnage;
            });

            const sessions = Object.entries(sessionTonnage).sort((a, b) => a[0].localeCompare(b[0])).slice(-12);
            const maxTonnage = Math.max(...sessions.map(s => s[1]), 1);
            const avgTonnage = Math.round(sessions.reduce((s, t) => s + t[1], 0) / sessions.length);

            let html = `<div class="chart-title">⚖️ Tonnage per Session (kg moved)</div>`;
            html += `<div class="stats-summary">
                <div class="stat-box"><div class="stat-value">${avgTonnage.toLocaleString()}</div><div class="stat-label">Avg Tonnage</div></div>
                <div class="stat-box"><div class="stat-value">${Math.max(...sessions.map(s => s[1])).toLocaleString()}</div><div class="stat-label">Peak Session</div></div>
                <div class="stat-box"><div class="stat-value">${sessions.length}</div><div class="stat-label">Sessions</div></div>
            </div>`;
            html += `<div class="chart-canvas"><div class="bar-chart">`;
            sessions.forEach(([date, tonnage], i) => {
                const height = (tonnage / maxTonnage * 100);
                const dayName = new Date(date + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short' });
                html += `<div class="bar-item">
                    <span class="bar-value">${Math.round(tonnage / 1000)}k</span>
                    <div class="bar" style="height:${height}%;background:linear-gradient(to top, #e67e22, #f5b041);"></div>
                    <span class="bar-label">${dayName}</span>
                </div>`;
            });
            html += `</div></div>`;
            return html;
        }

        function renderIntensityChart() {
            const strengthEntries = entries.filter(e => e.entryType !== 'cardio' && e.exercise && e.load > 0);
            if (strengthEntries.length === 0) return '<p style="color:#aaa;text-align:center;padding:40px;">No data yet</p>';

            // Find max load per exercise to calculate relative intensity
            const maxLoads = {};
            strengthEntries.forEach(e => {
                if (!maxLoads[e.exercise] || e.load > maxLoads[e.exercise]) maxLoads[e.exercise] = e.load;
            });

            // Categorize sets by intensity zone
            let light = 0, moderate = 0, heavy = 0, max = 0;
            strengthEntries.forEach(e => {
                const relIntensity = maxLoads[e.exercise] > 0 ? (e.load / maxLoads[e.exercise]) : 0;
                const sets = e.sets || 1;
                if (relIntensity < 0.70) light += sets;
                else if (relIntensity < 0.80) moderate += sets;
                else if (relIntensity < 0.90) heavy += sets;
                else max += sets;
            });

            const total = light + moderate + heavy + max;
            const zones = [
                { label: '<70%', sets: light, color: '#2ecc71', pct: Math.round(light / total * 100) },
                { label: '70-80%', sets: moderate, color: '#f1c40f', pct: Math.round(moderate / total * 100) },
                { label: '80-90%', sets: heavy, color: '#e67e22', pct: Math.round(heavy / total * 100) },
                { label: '90%+', sets: max, color: '#e94560', pct: Math.round(max / total * 100) }
            ];
            const maxSets = Math.max(...zones.map(z => z.sets), 1);

            let html = `<div class="chart-title">🔥 Intensity Distribution (relative to exercise PR)</div>`;

        function renderSetVolumeChart() {
            const strengthEntries = entries.filter(e => e.entryType !== 'cardio' && e.exercise);
            if (strengthEntries.length === 0) return '<p style="color:#aaa;text-align:center;padding:40px;">No data yet</p>';

            // Get current week entries only
            const todayStr = getTodayBrazil();
            const { year: curYear, week: curWeek } = getWeekInfo(todayStr);
            const currentWeekKey = `${curYear}-W${String(curWeek).padStart(2, '0')}`;

            const weekEntries = strengthEntries.filter(e => {
                const { year, week } = getWeekInfo(e.date);
                return `${year}-W${String(week).padStart(2, '0')}` === currentWeekKey;
            });

            // Count sets per muscle for this week
            const muscleSets = {};
            weekEntries.forEach(e => {
                const sets = e.sets || 1;
                if (e.primaryMuscle) {
                    muscleSets[e.primaryMuscle] = (muscleSets[e.primaryMuscle] || 0) + sets;
                }
                if (e.secondaryMuscle) {
                    muscleSets[e.secondaryMuscle] = (muscleSets[e.secondaryMuscle] || 0) + Math.round(sets * 0.5);
                }
            });

            const sorted = Object.entries(muscleSets).sort((a, b) => b[1] - a[1]);
            const maxSets = sorted.length > 0 ? Math.max(sorted[0][1], 20) : 20;

            let html = `<div class="chart-title">📐 Sets per Muscle Group (This Week)</div>`;
            html += `<p style="color:#666;font-size:0.75rem;margin-bottom:15px;">Hypertrophy optimal: 10-20 sets/muscle/week. Green line = 10 sets minimum.</p>`;

            if (sorted.length === 0) {
                html += '<p style="color:#aaa;text-align:center;padding:20px;">No data this week. Assign muscle groups to your exercises.</p>';
                return html;
            }

            html += `<div class="chart-canvas" style="position:relative;"><div class="bar-chart" style="position:relative;">`;
            // Reference line at 10 sets
            const lineHeight = (10 / maxSets * 100);
            html += `<div style="position:absolute;bottom:${lineHeight}%;left:0;right:0;border-top:2px dashed #2ecc71;opacity:0.5;z-index:1;"></div>`;
            sorted.forEach(([muscle, sets]) => {
                const height = (sets / maxSets * 100);
                const color = sets >= 10 ? '#2ecc71' : sets >= 6 ? '#f1c40f' : '#e94560';
                html += `<div class="bar-item">
                    <span class="bar-value">${sets}</span>
                    <div class="bar" style="height:${height}%;background:${color};"></div>
                    <span class="bar-label">${muscle}</span>
                </div>`;
            });
            html += `</div></div>`;
            return html;
        }

        function renderFatigueChart() {
            const strengthEntries = entries.filter(e => e.entryType !== 'cardio' && e.rpe > 0);
            if (strengthEntries.length === 0) return '<p style="color:#aaa;text-align:center;padding:40px;">No RPE data yet</p>';

            // Average RPE per session (date)
            const sessionRpe = {};
            strengthEntries.forEach(e => {
                if (!sessionRpe[e.date]) sessionRpe[e.date] = { total: 0, count: 0 };
                sessionRpe[e.date].total += e.rpe;
                sessionRpe[e.date].count++;
            });

            const sessions = Object.entries(sessionRpe)
                .map(([date, data]) => ({ date, avg: Math.round(data.total / data.count * 10) / 10 }))
                .sort((a, b) => a.date.localeCompare(b.date))
                .slice(-12);

            const maxRpe = 10;
            const avgRpe = (sessions.reduce((s, sess) => s + sess.avg, 0) / sessions.length).toFixed(1);
            const trend = sessions.length > 3 ?
                (sessions.slice(-3).reduce((s, sess) => s + sess.avg, 0) / 3) -
                (sessions.slice(0, 3).reduce((s, sess) => s + sess.avg, 0) / 3) : 0;
            const trendLabel = trend > 0.3 ? '📈 Rising (fatigue accumulating)' : trend < -0.3 ? '📉 Dropping (recovering)' : '➡️ Stable';

            let html = `<div class="chart-title">😤 Fatigue Indicator (Session Avg RPE)</div>`;
            html += `<p style="color:#666;font-size:0.75rem;margin-bottom:15px;">Rising RPE at similar loads = accumulated fatigue. Consider a deload if trending up consistently.</p>`;
            html += `<div class="stats-summary">
                <div class="stat-box"><div class="stat-value">${avgRpe}</div><div class="stat-label">Avg RPE</div></div>
                <div class="stat-box"><div class="stat-value" style="font-size:1rem;">${trendLabel}</div><div class="stat-label">Trend</div></div>
            </div>`;
            html += `<div class="chart-canvas"><div class="bar-chart">`;
            sessions.forEach((sess, i) => {
                const height = (sess.avg / maxRpe * 100);
                const color = sess.avg <= 7 ? '#2ecc71' : sess.avg <= 8.5 ? '#f1c40f' : '#e94560';
                const dayName = new Date(sess.date + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short' });
                html += `<div class="bar-item">
                    <span class="bar-value">${sess.avg}</span>
                    <div class="bar" style="height:${height}%;background:${color};"></div>
                    <span class="bar-label">${dayName}</span>
                </div>`;
            });
            html += `</div></div>`;
            return html;
        }

        function renderMuscleChart() {

            if (strengthEntries.length === 0) return '<p style="color:#aaa;text-align:center;padding:40px;">No data yet</p>';

                    if (e.secondaryMuscle) {
                        muscleCounts[e.secondaryMuscle] = (muscleCounts[e.secondaryMuscle] || 0) + Math.round(sets * 0.5);
                    }
                    if (e.tertiaryMuscle) {
                        muscleCounts[e.tertiaryMuscle] = (muscleCounts[e.tertiaryMuscle] || 0) + Math.round(sets * 0.3);

                // Fallback: keyword detection
                const lower = e.exercise.toLowerCase();
                let found = false;
                for (const [muscle, keywords] of Object.entries(muscleMap)) {

                        muscleCounts[muscle] = (muscleCounts[muscle] || 0) + sets;
                        found = true;
                        break;

                if (!found) muscleCounts['Other'] = (muscleCounts['Other'] || 0) + sets;

            const sorted = Object.entries(muscleCounts).sort((a, b) => b[1] - a[1]);

            html += `<div class="chart-canvas"><div class="bar-chart">`;

                const height = (sets / maxSets * 100);
                html += `<div class="bar-item">
                    <span class="bar-value">${sets}</span>
                    <div class="bar" style="height:${height}%;background:${colors[i % colors.length]};"></div>
                    <span class="bar-label">${muscle}</span>
                </div>`;

        // Cycle Analysis
        function renderCycleAnalysis() {
            const dates = entries.map(e => e.date).sort();
            const minDate = dates.length > 0 ? dates[0] : getTodayBrazil();
            const maxDate = dates.length > 0 ? dates[dates.length - 1] : getTodayBrazil();

            let html = `
                <div class="chart-title">🔄 Cycle Analysis</div>
                <p style="color:#aaa;font-size:0.85rem;margin-bottom:15px;">Define a training cycle (8-16 weeks) and analyze volume, intensity, and progression within that period.</p>

                <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;align-items:flex-end;">
                    <div class="form-group">
                        <label>Cycle Start</label>
                        <input type="date" id="cycle-start" value="${minDate}" style="padding:8px;border:1px solid #0f3460;border-radius:6px;background:#1a1a2e;color:#eee;">
                    </div>
                    <div class="form-group">
                        <label>Cycle End</label>
                        <input type="date" id="cycle-end" value="${maxDate}" style="padding:8px;border:1px solid #0f3460;border-radius:6px;background:#1a1a2e;color:#eee;">
                    </div>

                <div id="cycle-output"></div>
            `;

        function analyzeCycle() {
            const startDate = document.getElementById('cycle-start').value;
            const endDate = document.getElementById('cycle-end').value;
            const output = document.getElementById('cycle-output');

            if (!startDate || !endDate) {
                output.innerHTML = '<p style="color:#e74c3c;">Please select start and end dates.</p>';
                return;
            }

            const cycleEntries = entries.filter(e => e.date >= startDate && e.date <= endDate && e.entryType !== 'cardio');

            if (cycleEntries.length === 0) {
                output.innerHTML = '<p style="color:#aaa;text-align:center;padding:20px;">No strength entries found in this period.</p>';
                return;
            }

            const start = new Date(startDate + 'T00:00:00');
            const end = new Date(endDate + 'T00:00:00');
            const totalDays = Math.round((end - start) / 86400000) + 1;
            const totalWeeks = Math.ceil(totalDays / 7);

            const totalSessions = new Set(cycleEntries.map(e => e.date)).size;
            const totalSets = cycleEntries.reduce((s, e) => s + (e.sets || 0), 0);
            const totalVolume = cycleEntries.reduce((s, e) => s + ((e.sets || 0) * (e.reps || 0) * (e.load || 0)), 0);
            const avgLoad = cycleEntries.filter(e => e.load > 0).length > 0
                ? (cycleEntries.filter(e => e.load > 0).reduce((s, e) => s + e.load, 0) / cycleEntries.filter(e => e.load > 0).length).toFixed(1)
                : 0;
            const avgFrequency = (totalSessions / totalWeeks).toFixed(1);

            // Weekly breakdown
            const weeklyData = {};
            cycleEntries.forEach(e => {
                const { year, week } = getWeekInfo(e.date);
                const key = `${year}-W${String(week).padStart(2, '0')}`;
                if (!weeklyData[key]) weeklyData[key] = { volume: 0, sets: 0, sessions: new Set(), maxLoad: 0 };
                weeklyData[key].volume += (e.sets || 0) * (e.reps || 0) * (e.load || 0);
                weeklyData[key].sets += (e.sets || 0);
                weeklyData[key].sessions.add(e.date);
                if (e.load > weeklyData[key].maxLoad) weeklyData[key].maxLoad = e.load;
            });

            const weekKeys = Object.keys(weeklyData).sort();
            const weekVolumes = weekKeys.map(k => weeklyData[k].volume);
            const weekMaxLoads = weekKeys.map(k => weeklyData[k].maxLoad);
            const maxVol = Math.max(...weekVolumes, 1);
            const maxLoad = Math.max(...weekMaxLoads, 1);

            // Trends
            const halfIdx = Math.floor(weekKeys.length / 2);
            const firstHalfVol = weekVolumes.slice(0, halfIdx).reduce((s, v) => s + v, 0) / Math.max(halfIdx, 1);
            const secondHalfVol = weekVolumes.slice(halfIdx).reduce((s, v) => s + v, 0) / Math.max(weekKeys.length - halfIdx, 1);
            const volTrend = secondHalfVol > firstHalfVol * 1.05 ? '📈 Increasing' : secondHalfVol < firstHalfVol * 0.95 ? '📉 Decreasing' : '➡️ Stable';

            const firstHalfLoad = weekMaxLoads.slice(0, halfIdx).reduce((s, v) => s + v, 0) / Math.max(halfIdx, 1);
            const secondHalfLoad = weekMaxLoads.slice(halfIdx).reduce((s, v) => s + v, 0) / Math.max(weekKeys.length - halfIdx, 1);
            const loadTrend = secondHalfLoad > firstHalfLoad * 1.03 ? '📈 Progressive Overload' : secondHalfLoad < firstHalfLoad * 0.97 ? '📉 Tapering' : '➡️ Stable';

            // Cycle PRs
            const cyclePRs = {};
            cycleEntries.forEach(e => {
                if (e.load > 0 && (!cyclePRs[e.exercise] || e.load > cyclePRs[e.exercise])) {
                    cyclePRs[e.exercise] = e.load;
                }
            });
            const topPRs = Object.entries(cyclePRs).sort((a, b) => b[1] - a[1]).slice(0, 5);

            let html = `
                <div class="stats-summary">
                    <div class="stat-box"><div class="stat-value">${totalWeeks}</div><div class="stat-label">Weeks</div></div>
                    <div class="stat-box"><div class="stat-value">${totalSessions}</div><div class="stat-label">Sessions</div></div>
                    <div class="stat-box"><div class="stat-value">${avgFrequency}</div><div class="stat-label">Avg Days/Week</div></div>
                    <div class="stat-box"><div class="stat-value">${totalSets}</div><div class="stat-label">Total Sets</div></div>
                    <div class="stat-box"><div class="stat-value">${totalVolume.toLocaleString()}</div><div class="stat-label">Total Volume (kg)</div></div>
                    <div class="stat-box"><div class="stat-value">${avgLoad} kg</div><div class="stat-label">Avg Load</div></div>
                </div>

                <div style="display:flex;gap:15px;flex-wrap:wrap;margin-bottom:20px;">
                    <div class="stat-box" style="flex:1;"><div class="stat-value" style="font-size:1rem;">${volTrend}</div><div class="stat-label">Volume Trend</div></div>
                    <div class="stat-box" style="flex:1;"><div class="stat-value" style="font-size:1rem;">${loadTrend}</div><div class="stat-label">Intensity Trend</div></div>
                </div>

                <div class="chart-title" style="font-size:0.95rem;">Weekly Volume</div>
                <div class="chart-canvas"><div class="bar-chart">`;

            weekKeys.forEach((k, i) => {
                const vol = weekVolumes[i];
                const height = (vol / maxVol * 100);
                html += `<div class="bar-item">
                    <span class="bar-value">${vol > 0 ? Math.round(vol / 1000) + 'k' : '-'}</span>
                    <div class="bar" style="height:${height}%;background:linear-gradient(to top, #e94560, #ff6b6b);"></div>
                    <span class="bar-label">W${i + 1}</span>
                </div>`;
            });

            html += `</div></div>`;

            html += `<div class="chart-title" style="font-size:0.95rem;margin-top:20px;">Weekly Peak Load (kg)</div>
                <div class="chart-canvas"><div class="bar-chart">`;

            weekKeys.forEach((k, i) => {
                const load = weekMaxLoads[i];
                const height = (load / maxLoad * 100);
                html += `<div class="bar-item">
                    <span class="bar-value">${load > 0 ? load : '-'}</span>
                    <div class="bar" style="height:${height}%;background:linear-gradient(to top, #3498db, #5dade2);"></div>
                    <span class="bar-label">W${i + 1}</span>
                </div>`;
            });

            html += `</div></div>`;

            if (topPRs.length > 0) {
                html += `<div class="chart-title" style="font-size:0.95rem;margin-top:20px;">🏆 Cycle PRs</div>`;
                html += `<div class="stats-summary">`;
                topPRs.forEach(([name, load]) => {
                    html += `<div class="stat-box"><div class="stat-value">${load} kg</div><div class="stat-label">${escapeHtml(name)}</div></div>`;
                });
                html += `</div>`;
            }

            output.innerHTML = html;
        }

        // Muscle Config Modal
        const muscleOptions = ['', 'Biceps', 'Calves', 'Chest', 'Core', 'Front Delts', 'Glutes', 'Hamstrings', 'Lats', 'Mid Delts', 'Quads', 'Rear Delts', 'Rhomboids', 'Spine', 'Traps', 'Triceps'];

        };

        // Auto-assign muscles from default map for exercises that don't have them
        function autoAssignMuscles() {
            let updated = false;
            entries.forEach(e => {
                if (e.entryType === 'cardio' || !e.exercise || e.primaryMuscle) return;
                // Try exact match first, then case-insensitive
                const mapping = defaultMuscleMap[e.exercise] ||
                    defaultMuscleMap[Object.keys(defaultMuscleMap).find(k => k.toLowerCase() === e.exercise.toLowerCase())];
                if (mapping) {
                    e.primaryMuscle = mapping.p;
                    e.secondaryMuscle = mapping.s;
                    e.tertiaryMuscle = mapping.t;
                    e.quaternaryMuscle = mapping.q;
                    updated = true;
                }
            });
            if (updated) saveEntries();
        }
        autoAssignMuscles();

        function openMuscleConfig() {
            const uniqueExercises = [...new Set(entries.filter(e => e.entryType !== 'cardio' && e.exercise).map(e => e.exercise))].sort();

            const list = document.getElementById('muscle-config-list');

            let html = `<table class="workout-table" style="text-align:left;">
                <thead><tr><th style="text-align:left;">Exercise</th><th>Primary</th><th>Secondary</th><th>Tertiary</th><th>Quaternary</th></tr></thead>
                <tbody>`;

            uniqueExercises.forEach(name => {
                // Get current muscle groups from the most recent entry of this exercise
                const latest = [...entries].reverse().find(e => e.exercise === name && e.entryType !== 'cardio');
                const primary = latest ? (latest.primaryMuscle || '') : '';
                const secondary = latest ? (latest.secondaryMuscle || '') : '';
                const tertiary = latest ? (latest.tertiaryMuscle || '') : '';
                const quaternary = latest ? (latest.quaternaryMuscle || '') : '';

                const makeOptions = (selected) => muscleOptions.map(opt =>
                    `<option value="${opt}" ${opt === selected ? 'selected' : ''}>${opt || 'None'}</option>`
                ).join('');

                html += `<tr data-exercise="${escapeHtml(name)}">
                    <td style="text-align:left;">${exerciseWithEmoji(name)}</td>
                    <td><select class="muscle-primary" style="padding:4px;border:1px solid #0f3460;border-radius:4px;background:#1a1a2e;color:#eee;font-size:0.75rem;">${makeOptions(primary)}</select></td>
                    <td><select class="muscle-secondary" style="padding:4px;border:1px solid #0f3460;border-radius:4px;background:#1a1a2e;color:#eee;font-size:0.75rem;">${makeOptions(secondary)}</select></td>
                    <td><select class="muscle-tertiary" style="padding:4px;border:1px solid #0f3460;border-radius:4px;background:#1a1a2e;color:#eee;font-size:0.75rem;">${makeOptions(tertiary)}</select></td>
                    <td><select class="muscle-quaternary" style="padding:4px;border:1px solid #0f3460;border-radius:4px;background:#1a1a2e;color:#eee;font-size:0.75rem;">${makeOptions(quaternary)}</select></td>
                </tr>`;
            });

            html += `</tbody></table>`;
            list.innerHTML = html;

            document.getElementById('muscle-config-modal').classList.add('active');
        }

        function closeMuscleConfig() {
            document.getElementById('muscle-config-modal').classList.remove('active');
        }

        function saveMuscleConfig() {
            const rows = document.querySelectorAll('#muscle-config-list tbody tr');
            rows.forEach(row => {
                const exerciseName = row.dataset.exercise;
                const primary = row.querySelector('.muscle-primary').value;
                const secondary = row.querySelector('.muscle-secondary').value;
                const tertiary = row.querySelector('.muscle-tertiary').value;
                const quaternary = row.querySelector('.muscle-quaternary').value;

                // Update all entries with this exercise name
                entries.forEach(e => {
                    if (e.exercise === exerciseName && e.entryType !== 'cardio') {
                        e.primaryMuscle = primary;
                        e.secondaryMuscle = secondary;
                        e.tertiaryMuscle = tertiary;
                        e.quaternaryMuscle = quaternary;
                    }
                });
            });

            saveEntries();
            closeMuscleConfig();
            renderChart('muscle');
        }

        // Close muscle config modal on overlay click
        document.getElementById('muscle-config-modal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('muscle-config-modal')) closeMuscleConfig();
        });
    </script>
</body>
</html>
